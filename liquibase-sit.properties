# Oracle connection (adjust service name/port if needed)
url=jdbc:oracle:thin:@FREEPDB1
username=HR_SIT
password=12345678

# Oracle driver
driver=oracle.jdbc.OracleDriver

# If using SQLcl-bundled Liquibase and driver is already available, this can still stay.
# Update/remove if your setup resolves driver differently.
classpath=./lib/ojdbc11.jar

# Main changelog
changeLogFile=db/hr/changelog-root.xml
defaultSchemaName=HR
liquibaseSchemaName=HR

# Liquibase tracking tables
databaseChangeLogTableName=DATABASECHANGELOG
databaseChangeLogLockTableName=DATABASECHANGELOGLOCK

logLevel=info
showBanner=false
